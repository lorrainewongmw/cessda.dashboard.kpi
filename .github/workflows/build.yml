name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: self owned	

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cessda-dashboard-kpi

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cessda-dashboard-kpi:latest
            ghcr.io/${{ github.repository_owner }}/cessda-dashboard-kpi:${{ github.sha }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: YOUR_ORG/cessda-dashboard-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag
        run: |
          cd gitops
          sed -i "s|image:.*|image: ghcr.io/${{ github.repository_owner }}/cessda-dashboard-kpi:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit and Push changes
        run: |
          cd gitops
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"
          git push